# suppress inspection "UnusedProperty" for whole file
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
logging.level.org.springframework.orm.jpa=INFO
logging.level.org.springframework.transaction=INFO
logging.level.org.springframework.transaction.interceptor=TRACE
logging.level.org.springframework.orm.jpa.JpaTransactionManager=DEBUG
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/shareit
spring.datasource.username=shareitdbuser
spring.datasource.password=shareit12345
logging.level.org.zalando.logbook=INFO
# Solve the weird connection close error inbetween comment tests. This way Postman will know to expect a closed conn.
server.tomcat.keep-alive-timeout=1000
server.port=9090
